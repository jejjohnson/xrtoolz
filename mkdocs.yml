site_name: xrtoolz
site_description: Composable operator library for geoprocessing Earth System Data Cubes.
site_author: J. Emmanuel Johnson
repo_url: https://github.com/jejjohnson/xrtoolz
repo_name: jejjohnson/xrtoolz

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true

nav:
  - Home: index.md
  - Design:
      - Overview: design/README.md
      - Vision: design/vision.md
      - Architecture: design/architecture.md
      - Boundaries: design/boundaries.md
      - Decisions: design/decisions.md
      - API:
          - Overview: design/api/README.md
          - Primitives (L0): design/api/primitives.md
          - Components (L1): design/api/components.md
          - Models (L2): design/api/models.md
      - Examples:
          - Overview: design/examples/README.md
          - Primitives: design/examples/primitives.md
          - Components: design/examples/components.md
          - Models: design/examples/models.md
          - Integration: design/examples/integration.md
  - Tutorials:
      - Core:
          - Operators & Pipelines: notebooks/operators_pipeline_demo.ipynb
          - Structural Summaries: notebooks/sequential_summary_demo.ipynb
          - Sklearn patch-wise Recipe: notebooks/sklearn_patchwise_recipe.ipynb
          - NaN-aware Smoothing: notebooks/nan_aware_smoothing.ipynb
      - Validation:
          - V1 — Scales of Evaluation: notebooks/validation_v1_scales.ipynb
          - V1.5 — PSD Plots & Resolved Scale: notebooks/validation_v1_psd_plots.ipynb
          - V2 — Data Representation: notebooks/validation_v2_data_representation.ipynb
          - V4 — Process Evaluation: notebooks/validation_v4_process.ipynb
          - V6 — Capstone: notebooks/validation_v6_capstone.ipynb
      - Ocean:
          - Kinematics — GLORYS vs DUACS: notebooks/ocean_kinematics_glorys_duacs.ipynb
          - Along-track SSH: notebooks/ocean_alongtrack_ssh.ipynb
          - Stratification — GLORYS 3D: notebooks/ocean_stratification_glorys.ipynb
      - Data — CMEMS:
          - SST Products: notebooks/cmems_sst_products.ipynb
          - SSS Products: notebooks/cmems_sss_products.ipynb
          - SSH Products: notebooks/cmems_ssh_products.ipynb
          - Ocean Colour: notebooks/cmems_oc_products.ipynb
      - Data — CDS In-situ:
          - Surface Land: notebooks/cds_insitu_land_demo.ipynb
          - Surface Marine: notebooks/cds_insitu_marine_demo.ipynb
      - Data — AEMET:
          - Smoke Demo: notebooks/aemet_smoke.ipynb
          - Comunidad Valenciana: notebooks/aemet_valencia.ipynb
          - National Climatology: notebooks/aemet_national.ipynb
  - API Reference:
      - Overview: api/reference.md
      - Core: api/core.md
      - Metrics: api/metrics.md
      - Validation Panels: api/validation.md
  - Contributing: contributing.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3.2.2/es5/tex-mml-chtml.js
