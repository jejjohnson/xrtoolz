site_name: xrtoolz
site_description: Composable operator library for geoprocessing Earth System Data Cubes.
site_author: J. Emmanuel Johnson
repo_url: https://github.com/jejjohnson/xrtoolz
repo_name: jejjohnson/xrtoolz

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            docstring_options:
              warn_unknown_params: false
            merge_init_into_class: true
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            members_order: source
            filters: ["!^_"]
            heading_level: 3
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true

nav:
  - Home: index.md
  - Design:
      - Overview: design/README.md
      - Vision: design/vision.md
      - Architecture: design/architecture.md
      - Boundaries: design/boundaries.md
      - Decisions: design/decisions.md
      - API:
          - Overview: design/api/README.md
          - Primitives (L0): design/api/primitives.md
          - Components (L1): design/api/components.md
          - Models (L2): design/api/models.md
      - Examples:
          - Overview: design/examples/README.md
          - Primitives: design/examples/primitives.md
          - Components: design/examples/components.md
          - Models: design/examples/models.md
          - Integration: design/examples/integration.md
      - Bridge Modules:
          - Overview: design/bridges/README.md
          - Cross-cutting: design/bridges/overview.md
          - einx (named-tensor algebra):
              - Vision: design/bridges/einx/vision.md
              - Architecture: design/bridges/einx/architecture.md
              - API: design/bridges/einx/api.md
              - Decisions: design/bridges/einx/decisions.md
          - linalg (structured linear algebra):
              - Vision: design/bridges/linalg/vision.md
              - Architecture: design/bridges/linalg/architecture.md
              - API: design/bridges/linalg/api.md
              - Decisions: design/bridges/linalg/decisions.md
          - prob (probabilistic distributions):
              - Vision: design/bridges/prob/vision.md
              - Architecture: design/bridges/prob/architecture.md
              - API: design/bridges/prob/api.md
              - Decisions: design/bridges/prob/decisions.md
  - Tutorials:
      - Core:
          - Operators & Pipelines: notebooks/operators_pipeline_demo.ipynb
          - Structural Summaries: notebooks/sequential_summary_demo.ipynb
          - Sklearn patch-wise Recipe: notebooks/sklearn_patchwise_recipe.ipynb
          - NaN-aware Smoothing: notebooks/nan_aware_smoothing.ipynb
          - Inference with ModelOp: notebooks/inference_modelop_demo.ipynb
      - Ocean:
          - Kinematics — GLORYS vs DUACS: notebooks/ocean_kinematics_glorys_duacs.ipynb
          - Along-track SSH: notebooks/ocean_alongtrack_ssh.ipynb
          - Stratification — GLORYS 3D: notebooks/ocean_stratification_glorys.ipynb
      - Gridding & Binning:
          - SST — Binning L3 onto a Grid: notebooks/cmems_sst_products.ipynb
          - SSS — Binning L3 onto a Grid: notebooks/cmems_sss_products.ipynb
          - SSH — Binning Along-track: notebooks/cmems_ssh_products.ipynb
          - Ocean Colour — Binning: notebooks/cmems_oc_products.ipynb
      - Validation:
          - V1 — Scales of Evaluation: notebooks/validation_v1_scales.ipynb
          - V1.5 — PSD Plots & Resolved Scale: notebooks/validation_v1_psd_plots.ipynb
          - V2 — Data Representation: notebooks/validation_v2_data_representation.ipynb
          - V4 — Process Evaluation: notebooks/validation_v4_process.ipynb
          - V6 — Capstone: notebooks/validation_v6_capstone.ipynb
  - API Reference:
      - Overview: api/index.md
      - Composition: api/composition.md
      - Geoprocessing:
          - Validation & Coordinates: api/geo/coords.md
          - Subsetting, Regions & Masks: api/geo/subset.md
          - CRS & Reprojection: api/geo/crs.md
          - Climatology & Anomalies: api/geo/climatology.md
          - Wavelet Analysis: api/geo/wavelet.md
          - Extremes: api/geo/extremes.md
      - Numerics:
          - Calculus: api/calc.md
          - Transforms: api/transforms.md
          - Encoders: api/encoders.md
          - Interpolation: api/interpolate.md
      - Domain Physics:
          - Oceanography: api/ocn.md
          - Atmosphere: api/atm.md
          - Remote Sensing: api/rs.md
      - Diagnostics:
          - Metrics: api/metrics.md
          - Budgets: api/budgets.md
      - Bridges & Integration:
          - Named-tensor Algebra (einx): api/einx.md
          - Inference: api/inference.md
          - Visualization: api/viz.md
          - Utilities: api/utils.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3.2.2/es5/tex-mml-chtml.js
